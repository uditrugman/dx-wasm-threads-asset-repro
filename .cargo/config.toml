# Minimum flag set that triggers the bug.
#
# Bisection (see README) reduced the original wasm-threads set down
# to two settings: `+atomics` plus a rebuilt std. Either one alone
# is fine; together they break dx's asset scanner.
[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "target-feature=+atomics",
]

[unstable]
build-std = ["panic_abort", "std"]
